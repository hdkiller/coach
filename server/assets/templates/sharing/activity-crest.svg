<svg viewBox="0 0 1080 1920" width="1080" height="1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="crest-panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)" />
    </linearGradient>
    <linearGradient id="crest-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00DC82" />
      <stop offset="100%" stop-color="#B8FFE3" />
    </linearGradient>
    <radialGradient id="crest-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00DC82" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#00DC82" stop-opacity="0" />
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch" />
    </filter>
    <style>
      .kicker {
        font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 700;
        font-size: 24px;
        fill: #7cffcb;
        letter-spacing: 8px;
        text-transform: uppercase;
      }
      .title {
        font-family: 'Arial Narrow', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 900;
        font-style: italic;
        font-size: 88px;
        fill: #ffffff;
        letter-spacing: -2px;
        text-transform: uppercase;
      }
      .hero {
        font-family: 'Arial Narrow', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 900;
        font-style: italic;
        font-size: 138px;
        fill: #ffffff;
      }
      .hero-unit {
        font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 700;
        font-size: 34px;
        fill: #a1a1aa;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
      .mini-label {
        font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 700;
        font-size: 18px;
        fill: #8a8a94;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .mini-value {
        font-family: 'Arial Narrow', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 900;
        font-style: italic;
        font-size: 64px;
        fill: #ffffff;
      }
      .mini-unit {
        font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 700;
        font-size: 22px;
        fill: #a1a1aa;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .footer {
        font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 700;
        font-size: 28px;
        fill: #00dc82;
        letter-spacing: 6px;
        text-transform: uppercase;
        opacity: 0.55;
      }
    </style>
  </defs>

  {{pageBackground}}
  <circle cx="540" cy="920" r="500" fill="url(#crest-glow)" />

  <rect
    x="66"
    y="74"
    width="948"
    height="1772"
    rx="46"
    fill="rgba(255,255,255,0.03)"
    stroke="url(#crest-panel)"
    stroke-width="2"
  />
  <rect x="108" y="116" width="864" height="18" rx="9" fill="rgba(255,255,255,0.05)" />
  <rect x="108" y="116" width="260" height="18" rx="9" fill="url(#crest-accent)" />

  <text
    x="540"
    y="{{titleYCrest}}"
    text-anchor="middle"
    class="title"
    style="font-size: {{titleFontSizeCrest}}px;"
  >
    <tspan x="540">{{titleLine1}}</tspan>
    <tspan x="540" dy="{{titleLineHeightCrest}}">{{titleLine2}}</tspan>
  </text>

  <g transform="translate(122, 420)">
    <circle
      cx="418"
      cy="372"
      r="356"
      fill="none"
      stroke="rgba(255,255,255,0.07)"
      stroke-width="2"
      stroke-dasharray="14 18"
    />
    <circle cx="418" cy="372" r="316" fill="none" stroke="rgba(0,220,130,0.18)" stroke-width="10" />
    {{mapPanel}}
  </g>

  <g transform="translate(132, 1216)">
    <text x="0" y="132">
      <tspan class="hero" style="font-size: {{heroFontSizeCrest}}px;">{{heroValue}}</tspan>
      <tspan class="hero-unit" style="font-size: {{heroUnitFontSizeCrest}}px;">{{heroUnit}}</tspan>
    </text>
  </g>
  <text x="540" y="226" text-anchor="middle" class="kicker">{{subtitle}}</text>
  <text x="132" y="1216" class="mini-label">{{heroLabel}}</text>

  <g transform="translate(136, 1488)">
    <path
      d="M 0 0 H 808"
      stroke="rgba(255,255,255,0.08)"
      stroke-width="2"
      stroke-dasharray="10 10"
    />
  </g>

  <g transform="translate(136, 1548)">
    <text x="0" y="0" class="mini-label">{{stat1Label}}</text>
    <text x="0" y="92">
      <tspan class="mini-value">{{stat1Value}}</tspan>
      <tspan class="mini-unit">{{stat1Unit}}</tspan>
    </text>
  </g>

  <g transform="translate(430, 1548)">
    <text x="0" y="0" class="mini-label">{{stat2Label}}</text>
    <text x="0" y="92">
      <tspan class="mini-value">{{stat2Value}}</tspan>
      <tspan class="mini-unit">{{stat2Unit}}</tspan>
    </text>
  </g>

  <g transform="translate(720, 1548)">
    <text x="0" y="0" class="mini-label">{{stat3Label}}</text>
    <text x="0" y="92">
      <tspan class="mini-value">{{stat3Value}}</tspan>
      <tspan class="mini-unit">{{stat3Unit}}</tspan>
    </text>
  </g>

  <text x="540" y="1816" text-anchor="middle" class="footer">CoachWatts.com</text>
</svg>
