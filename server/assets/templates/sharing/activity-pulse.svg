<svg viewBox="0 0 1080 1920" width="1080" height="1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pulse-card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)" />
      <stop offset="100%" stop-color="rgba(239,68,68,0.18)" />
    </linearGradient>
    <radialGradient id="pulse-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0" />
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch" />
    </filter>
    <style>
      .kicker {
        font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 700;
        font-size: 24px;
        fill: #fca5a5;
        letter-spacing: 8px;
        text-transform: uppercase;
      }
      .title {
        font-family: 'Arial Narrow', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 900;
        font-style: italic;
        fill: #ffffff;
        letter-spacing: -2px;
        text-transform: uppercase;
      }
      .label {
        font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 700;
        font-size: 20px;
        fill: #8a8a94;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .hero {
        font-family: 'Arial Narrow', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 900;
        font-style: italic;
        fill: #ffffff;
      }
      .hero-unit {
        font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 700;
        fill: #a1a1aa;
        letter-spacing: 3px;
        text-transform: uppercase;
      }
      .metric {
        font-family: 'Arial Narrow', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 900;
        font-style: italic;
        font-size: 64px;
        fill: #ffffff;
      }
      .metric-unit {
        font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 700;
        font-size: 24px;
        fill: #a1a1aa;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .footer {
        font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 700;
        font-size: 28px;
        fill: #ef4444;
        letter-spacing: 6px;
        text-transform: uppercase;
        opacity: 0.55;
      }
    </style>
  </defs>

  {{pageBackground}}
  <circle cx="760" cy="360" r="320" fill="url(#pulse-glow)" />

  <rect
    x="56"
    y="72"
    width="968"
    height="1776"
    rx="42"
    fill="rgba(255,255,255,0.03)"
    stroke="url(#pulse-card)"
    stroke-width="2"
  />

  <text x="92" y="198" class="kicker">{{subtitle}}</text>
  <text x="92" y="{{titleYPoster}}" class="title" style="font-size: {{titleFontSizePoster}}px;">
    <tspan x="92">{{titleLine1}}</tspan>
    <tspan x="92" dy="{{titleLineHeightPoster}}">{{titleLine2}}</tspan>
  </text>

  <g transform="translate(120, 406)">{{mapPanel}}</g>

  <g transform="translate(120, 916)">{{hrChartPanel}}</g>

  <g transform="translate(92, 1294)">
    <text x="0" y="0" class="label">{{heroLabel}}</text>
    <text x="0" y="124">
      <tspan class="hero" style="font-size: {{heroFontSizePoster}}px;">{{heroValue}}</tspan>
      <tspan class="hero-unit" style="font-size: {{heroUnitFontSizePoster}}px;">{{heroUnit}}</tspan>
    </text>
  </g>

  <g transform="translate(92, 1516)">
    <rect
      x="0"
      y="0"
      width="280"
      height="212"
      rx="28"
      fill="rgba(255,255,255,0.04)"
      stroke="rgba(255,255,255,0.07)"
    />
    <text x="30" y="50" class="label">{{stat1Label}}</text>
    <text x="30" y="136">
      <tspan class="metric">{{stat1Value}}</tspan>
      <tspan class="metric-unit">{{stat1Unit}}</tspan>
    </text>
  </g>

  <g transform="translate(400, 1516)">
    <rect
      x="0"
      y="0"
      width="280"
      height="212"
      rx="28"
      fill="rgba(255,255,255,0.04)"
      stroke="rgba(255,255,255,0.07)"
    />
    <text x="30" y="50" class="label">{{stat2Label}}</text>
    <text x="30" y="136">
      <tspan class="metric">{{stat2Value}}</tspan>
      <tspan class="metric-unit">{{stat2Unit}}</tspan>
    </text>
  </g>

  <g transform="translate(708, 1516)">
    <rect
      x="0"
      y="0"
      width="280"
      height="212"
      rx="28"
      fill="rgba(255,255,255,0.04)"
      stroke="rgba(255,255,255,0.07)"
    />
    <text x="30" y="50" class="label">{{stat3Label}}</text>
    <text x="30" y="136">
      <tspan class="metric">{{stat3Value}}</tspan>
      <tspan class="metric-unit">{{stat3Unit}}</tspan>
    </text>
  </g>

  <text x="540" y="1816" text-anchor="middle" class="footer">CoachWatts.com</text>
</svg>
