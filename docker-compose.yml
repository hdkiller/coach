services:
  app:
    build: .
    image: ghcr.io/pnposch/coach:latest
    container_name: watts-app
    env_file: .env
    environment:
      DATABASE_URL: postgresql://watts:password@watts-postgres:5432/watts?connection_limit=20&pool_timeout=10&connect_timeout=10
      REDIS_URL: redis://:dragonfly@watts-dragonfly:6379
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: watts-postgres
    environment:
      POSTGRES_USER: watts
      POSTGRES_PASSWORD: password
      POSTGRES_DB: watts
    ports:
      - '5439:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U watts']
      interval: 10s
      timeout: 5s
      retries: 5

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: watts-dragonfly
    ulimits:
      memlock: -1
    command:
      [
        '--default_lua_flags=allow-undeclared-keys',
        '--requirepass=dragonfly',
        '--admin_port=6380',
        '--admin_nopass',
        '--slowlog_log_slower_than=10000',
        '--slowlog_max_len=128'
      ]
    ports:
      - '6379:6379'
      - '6380:6380'
    volumes:
      - dragonfly_data:/data

volumes:
  postgres_data:
  dragonfly_data: