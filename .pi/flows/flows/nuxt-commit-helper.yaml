name: nuxt-commit-helper
description: >
  Check for changes, run tests (pnpm run tests) and fix failures,
  run typecheck (nuxi typecheck) and fix type errors, then commit and push.
task_required: false
steps:
  # 1. Check if there are changes to commit
  - id: check-status
    agent: git-status-checker
    task: Check if there are any uncommitted changes in the repository.

  # 2. Branch: no changes → done
  - id: has-changes
    type: conditional
    check: check-status.has_changes
    present: run-tests
    absent: nothing-to-do

  # 3. Run tests and fix failures
  - id: run-tests
    agent: test-runner
    blockedBy: [check-status]
    inputs:
      changed_files: '${{result.check-status.changed_files}}'
    task: >
      Run the test suite with `pnpm run tests` and fix any failures.
      Changed files: ${{result.check-status.changed_files}}

  # 4. Run typecheck and fix type errors
  - id: run-typecheck
    agent: type-checker
    blockedBy: [run-tests]
    inputs:
      changed_files: '${{result.check-status.changed_files}}'
    task: >
      Run `npx nuxi typecheck` and fix any type errors.
      Changed files: ${{result.check-status.changed_files}}

  # 5. Verify everything still passes after type fixes
  - id: retest-after-types
    agent: test-runner
    blockedBy: [run-typecheck]
    inputs:
      changed_files: '${{result.check-status.changed_files}}'
    task: >
      Re-run the test suite to make sure type fixes didn't break anything.
      Run `pnpm run tests` and fix any failures.

  # 6. Verify-fix loop (max 2 iterations of test → typecheck cycles)
  - id: verify-loop
    type: agent-loop-decision
    agent: flow-decision
    blockedBy: [retest-after-types]
    task: >
      Iteration ${{loop.verify-loop.iteration}}/${{loop.verify-loop.max}}.
      Test results: ${{result.retest-after-types.tests_pass}}
      Typecheck results: ${{result.run-typecheck.types_pass}}
      If both pass ("yes"), choose "commit". If either fails, choose "run-tests" to try again.
    loop_target: run-tests
    exit_target: commit
    max_iterations: 2

  # 7. Commit and push
  - id: commit
    agent: committer
    blockedBy: [verify-loop]
    inputs:
      changed_files: '${{result.check-status.changed_files}}'
      test_results: '${{result.retest-after-types.summary}}'
      typecheck_results: '${{result.run-typecheck.summary}}'
    task: >
      All checks passed. Commit and push the changes.

  # 8. Terminal: nothing to do
  - id: nothing-to-do
    agent: git-status-checker
    task: >
      Report that there are no changes to commit. The working tree is clean.
